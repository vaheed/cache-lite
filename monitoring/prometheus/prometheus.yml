global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['127.0.0.1:9090']

  - job_name: nginx
    static_configs:
      - targets: ['127.0.0.1:9113']

  - job_name: node
    static_configs:
      - targets: ['127.0.0.1:9100']

  - job_name: cadvisor
    static_configs:
      - targets: ['127.0.0.1:8088']
